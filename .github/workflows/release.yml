name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build MSI installer
        shell: pwsh
        run: |
          # Find WiX Toolset (pre-installed on windows-latest)
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) { Write-Error "WiX Toolset not found"; exit 1 }
          $wixBin = $wixDir.FullName + "\bin"
          Write-Host "Using WiX: $wixBin"
          $env:PATH = "$wixBin;$env:PATH"

          New-Item -ItemType Directory -Force -Path installer\obj | Out-Null
          $buildDir = (Resolve-Path "build\windows\x64\runner\Release").Path

          # Read version from pubspec.yaml
          $content = Get-Content pubspec.yaml -Raw
          $version = if ($content -match "version:\s*(\d+\.\d+\.\d+)") { "$($Matches[1]).0" } else { "1.0.0.0" }
          Write-Host "Building MSI version: $version"

          # Harvest all files from the Flutter build output
          heat.exe dir $buildDir -gg -scom -sreg -sfrag -srd `
            -dr INSTALLFOLDER -cg ProductComponents `
            -var var.SourceDir -out installer\obj\components.wxs
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Compile both wxs files
          candle.exe -dVersion="$version" -dSourceDir="$buildDir" `
            installer\installer.wxs installer\obj\components.wxs `
            -arch x64 -out installer\obj\
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Link into MSI
          light.exe installer\obj\installer.wixobj installer\obj\components.wixobj `
            -out YouNoter-installer.msi -ext WixUIExtension
          if ($LASTEXITCODE -ne 0) { exit 1 }

          Write-Host "MSI created: YouNoter-installer.msi"

      - name: Test MSI installation
        shell: pwsh
        run: |
          $msi = (Resolve-Path "YouNoter-installer.msi").Path
          Write-Host "Testing: $msi"

          # Install silently with log
          $proc = Start-Process msiexec.exe `
            -ArgumentList "/i `"$msi`" /qn /l*v install.log" `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Get-Content install.log -Tail 30
            Write-Error "MSI installation failed (exit $($proc.ExitCode))"
            exit 1
          }

          # Verify in Uninstall registry (x64 perMachine)
          $installed = Get-ItemProperty `
            "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*" `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.DisplayName -eq "YouNoter" }
          if (-not $installed) { Write-Error "YouNoter not found in installed programs"; exit 1 }
          Write-Host "Verified: $($installed.DisplayName) v$($installed.DisplayVersion)"

          # Uninstall
          $proc = Start-Process msiexec.exe `
            -ArgumentList "/x `"$msi`" /qn" `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) { Write-Error "Uninstall failed (exit $($proc.ExitCode))"; exit 1 }
          Write-Host "Test passed: MSI installs and uninstalls correctly"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: YouNoter-installer.msi

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package portable ZIP
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "YouNoter-${{ steps.version.outputs.tag }}-windows-portable.zip"

      - name: Rename MSI for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Copy-Item "YouNoter-installer.msi" "YouNoter-${{ steps.version.outputs.tag }}-windows-installer.msi"

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            YouNoter-*.zip
            YouNoter-*-windows-installer.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            YouNoter-*.zip
            YouNoter-*-windows-installer.msi
