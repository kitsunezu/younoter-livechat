name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX installer
        run: dart run msix:create --install-certificate false --build-windows false

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "YouNoter-${{ steps.version.outputs.tag }}-windows-portable.zip"

      - name: Rename MSIX
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path "build\windows\x64\runner\Release\" -Filter "*.msix" | Select-Object -First 1
          Copy-Item $msix.FullName "YouNoter-${{ steps.version.outputs.tag }}-windows-installer.msix"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            YouNoter-*.zip
            YouNoter-*.msix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            YouNoter-*.zip
            YouNoter-*.msix
